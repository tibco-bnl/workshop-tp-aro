# TIBCO Control Plane Base - Merged Values File
# Combined from platform-bootstrap and platform-base legacy charts
# For tibco-cp-base helm chart version 1.14.0+
# Location: /Users/kul/git/tib/workshop-tp-aro/howto/aro-kul/

# ========================================
# PREREQUISITES - Run these commands first
# ========================================
# 1. Create session keys secret:
# export TSC_SESSION_KEY=$(openssl rand -base64 48 | tr -dc A-Za-z0-9 | head -c32)
# export DOMAIN_SESSION_KEY=$(openssl rand -base64 48 | tr -dc A-Za-z0-9 | head -c32)
# kubectl create secret generic session-keys -n ${CP_INSTANCE_ID}-ns \
#   --from-literal=TSC_SESSION_KEY=${TSC_SESSION_KEY} \
#   --from-literal=DOMAIN_SESSION_KEY=${DOMAIN_SESSION_KEY}
#
# 2. Create database credentials secret:
# kubectl create secret generic ${CP_DB_SECRET_NAME} \
#   --from-literal=db_username=${CP_DB_USERNAME} \
#   --from-literal=db_password=${CP_DB_PASSWORD} \
#   -n ${CP_INSTANCE_ID}-ns
#
# 3. Create encryption secret:
# kubectl create secret generic cporch-encryption-secret -n ${CP_INSTANCE_ID}-ns \
#   --from-literal=CP_ENCRYPTION_SECRET_KEY=$(openssl rand -base64 32)

# ========================================
# GLOBAL CONFIGURATION
# ========================================
global:
  # ========================================
  # EXTERNAL CONFIGURATION (from platform-base)
  # ========================================
  external:
    # Encryption configuration
    cpEncryptionSecretName: cporch-encryption-secret
    cpEncryptionSecretKey: CP_ENCRYPTION_SECRET_KEY
    
    # Cluster network information
    clusterInfo:
      nodeCIDR: ${TP_NODE_CIDR}      # 10.5.2.0/23
      podCIDR: ${TP_POD_CIDR}        # 10.128.0.0/14
      serviceCIDR: ${TP_SERVICE_CIDR} # 172.30.0.0/16
    
    # DNS domains
    dnsDomain: ${CP_MY_DNS_DOMAIN}          # cp1-my.apps.nxp.atsnl-emea.azure.dataplanes.pro
    dnsTunnelDomain: ${CP_TUNNEL_DNS_DOMAIN} # cp1-tunnel.apps.nxp.atsnl-emea.azure.dataplanes.pro
    
    # Storage configuration
    storage:
      resources:
        requests:
          storage: ${CP_STORAGE_SIZE} # 10Gi
      storageClassName: ${TP_FILE_STORAGE_CLASS} # azure-files-sc
    
    # Database configuration
    db_host: ${CP_DB_HOST}           # postgresql.tibco-ext.svc.cluster.local
    db_name: ${CP_DB_NAME}           # postgres
    db_password: ${CP_DB_PASSWORD}   # postgres
    db_port: ${CP_DB_PORT}           # 5432
    db_secret_name: ${CP_DB_SECRET_NAME} # provider-cp-database-credentials
    db_ssl_mode: ${CP_DB_SSL_MODE}   # disable, require, verify-ca, verify-full
    db_username: ${CP_DB_USERNAME}   # postgres
    # db_ssl_root_cert_secretname: ${CP_DB_SSL_ROOT_CERT_SECRET_NAME} # Uncomment for SSL
    # db_ssl_root_cert_filename: ${CP_DB_SSL_ROOT_CERT_FILENAME}      # Uncomment for SSL
    
    # Email server configuration
    emailServerType: ${CP_EMAIL_SERVER_TYPE} # smtp
    emailServer:
      smtp:
        server: ${CP_EMAIL_SMTP_SERVER}   # development-mailserver.tibco-ext.svc.cluster.local
        port: ${CP_EMAIL_SMTP_PORT}       # 1025
        username: ${CP_EMAIL_SMTP_USERNAME} # Empty for MailDev
        password: ${CP_EMAIL_SMTP_PASSWORD} # Empty for MailDev
    
    # Admin user configuration
    admin:
      email: ${CP_ADMIN_EMAIL}         # cp-test@tibco.com
      firstname: ${CP_ADMIN_FIRSTNAME} # cp-test
      lastname: ${CP_ADMIN_LASTNAME}   # cp-test
      customerID: ${CP_ADMIN_CUSTOMER_ID} # nxp-customer-id
  
  # ========================================
  # TIBCO PLATFORM CONFIGURATION
  # ========================================
  tibco:
    # Container registry configuration
    containerRegistry:
      url: ${TP_CONTAINER_REGISTRY_URL}       # csgprdeuwrepoedge.jfrog.io
      username: ${TP_CONTAINER_REGISTRY_USER} # Your username
      password: ${TP_CONTAINER_REGISTRY_PASSWORD} # Your password
      repository: ${TP_CONTAINER_REGISTRY_REPOSITORY} # tibco-platform-docker-prod
    
    # Control plane instance identifier
    controlPlaneInstanceId: ${CP_INSTANCE_ID} # cp1
    
    # Service account
    serviceAccount: ${CP_INSTANCE_ID}-sa # cp1-sa
    
    # Network policy (optional)
    # createNetworkPolicy: false
    
    # Logging configuration
    logging:
      fluentbit:
        enabled: false # Set to true to enable logging
    
    # Helm chart repository (optional - uncomment if using private helm repo)
    # helm:
    #   url: ${TP_CHART_REGISTRY}
    #   repo: ${TP_CHART_REPO}
    #   username: ${TP_CHART_REPO_USER_NAME}
    #   password: ${TP_CHART_REPO_TOKEN}
    
    # SSL certificate secret (uncomment if using SSL for database)
    # db_ssl_root_cert_secretname: ${CP_DB_SSL_ROOT_CERT_SECRET_NAME}
    # db_ssl_root_cert_filename: ${CP_DB_SSL_ROOT_CERT_FILENAME}

# ========================================
# BOOTSTRAP COMPONENTS (from platform-bootstrap)
# ========================================

# Hybrid proxy for tunnel connectivity
hybrid-proxy:
  enabled: true
  enableWebHooks: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  ingress:
    enabled: true
    ingressClassName: ${TP_INGRESS_CLASS} # openshift-default
    tls:
      - secretName: ${CP_TUNNEL_TLS_SECRET_NAME} # custom-tunnel-tls
        hosts:
          - '*.${CP_TUNNEL_DNS_DOMAIN}' # *.cp1-tunnel.apps.nxp.atsnl-emea.azure.dataplanes.pro
    hosts:
      - host: '*.${CP_TUNNEL_DNS_DOMAIN}'
        paths:
          - path: /
            pathType: Prefix
            port: 105

# OpenTelemetry collector (optional - for logging)
otel-collector:
  enabled: false # Set to true to enable logging

# Resource set operator
resource-set-operator:
  enabled: true
  enableWebHooks: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# Router operator with session keys
router-operator:
  enabled: true
  enableWebHooks: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  # Session keys for authentication
  tscSessionKey:
    secretName: session-keys
    key: TSC_SESSION_KEY
  domainSessionKey:
    secretName: session-keys
    key: DOMAIN_SESSION_KEY
  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: ${TP_INGRESS_CLASS} # openshift-default
    tls:
      - secretName: ${CP_MY_TLS_SECRET_NAME} # custom-my-tls
        hosts:
          - '*.${CP_MY_DNS_DOMAIN}' # *.cp1-my.apps.nxp.atsnl-emea.azure.dataplanes.pro
    hosts:
      - host: '*.${CP_MY_DNS_DOMAIN}'
        paths:
          - path: /
            pathType: Prefix
            port: 100

# ========================================
# BASE COMPONENTS (from platform-base)
# ========================================

# Infrastructure services
tp-cp-infra:
  enabled: true
  resources:
    infra-compute-services:
      requests:
        cpu: 200m
        memory: 256Mi
    infra-alerts-services:
      requests:
        cpu: 200m
        memory: 256Mi

# Observability stack
tp-cp-o11y:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi

# Configuration and subscription management
tp-cp-configuration:
  tp-cp-subscription:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

# Recipes
tp-cp-recipes:
  enabled: true

# Core platform services
tp-cp-core:
  # Cronjob service
  cronjobs:
    cpcronjobservice:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    replicaCount: 1
  
  # Identity management
  identity-management:
    idm:
      resources:
        requests:
          cpu: 100m
          memory: 1024Mi
    replicaCount: 1
  
  # Identity provider
  identity-provider:
    replicaCount: 1
    tpcpidpservice:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
  
  # Orchestrator
  orchestrator:
    cporchservice:
      resources:
        requests:
          cpu: 500m
          memory: 256Mi
    replicaCount: 1
  
  # Provisioning engine
  pengine:
    replicaCount: 1
    tpcppengineservice:
      resources:
        requests:
          cpu: 300m
          memory: 128Mi
  
  # User subscriptions
  user-subscriptions:
    cpusersubservice:
      resources:
        requests:
          cpu: 500m
          memory: 128Mi
    replicaCount: 1
  
  # Web server (Control Plane UI)
  web-server:
    cpwebserver:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
    replicaCount: 1

# FinOps services
tp-cp-core-finops:
  finops-otel-collector:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  finops-service:
    finopsservice:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
  monitoring-service:
    monitoringservice:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
    replicaCount: 1

# Integration capabilities
tp-cp-integration:
  enabled: true
  
  # Common integration services (file server)
  tp-cp-integration-common:
    fileserver:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
  
  # BusinessWorks integration
  tp-cp-integration-bw:
    enabled: true
    bw-webserver:
      bwwebserver:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
  
  # Flogo integration
  tp-cp-integration-flogo:
    enabled: true
    flogo-webserver:
      flogowebserver:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
  
  # Integration utilities
  tp-cp-bwce-utilities:
    enabled: true
  tp-cp-bw5ce-utilities:
    enabled: true
  tp-cp-flogo-utilities:
    enabled: true

# TIBCO Hub contributions
tp-cp-tibcohub-contrib:
  enabled: true

# Messaging infrastructure
tibco-cp-messaging:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# Hawk observability
tp-cp-hawk-recipes:
  enabled: true

tp-cp-hawk:
  enabled: true
  tp-cp-hawk-infra-querynode:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi

# CLI tools
tp-cp-cli:
  enabled: true

# Alert manager
tp-cp-alertmanager:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

# Prometheus monitoring
tp-cp-prometheus:
  server:
    retention: "15d"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi

# Audit safe
tp-cp-auditsafe:
  enabled: true
  auditsafe:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi

# ========================================
# NOTES AND USAGE
# ========================================
