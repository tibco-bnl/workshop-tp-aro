# ========================================
# AZURE POSTGRESQL SAAS SPECIFIC NOTES
# ========================================
#
# SSL Connection String Format:
# postgresql://username@hostname:password@hostname.postgres.database.azure.com:5432/database?sslmode=require
#
# SSL Modes for Azure PostgreSQL:
# - disable: No SSL (not recommended for production)
# - require: SSL required but no certificate verification
# - verify-ca: SSL required with CA certificate verification
# - verify-full: SSL required with full certificate and hostname verification
#
# Azure PostgreSQL Connection Requirements:
# 1. Username format: username@servername (e.g., adminuser@myserver)
# 2. SSL is enforced by default on Azure PostgreSQL
# 3. Download SSL certificate from: https://docs.microsoft.com/en-us/azure/postgresql/concepts-ssl-connection-security
# 4. Configure firewall rules to allow ARO cluster IP range
# 5. Ensure database exists and user has proper grants
#
# Testing Azure PostgreSQL Connection:
# kubectl run -it --rm psql-test --image=postgres:16 --restart=Never -- \
#   psql "postgresql://${CP_DB_USERNAME}:${CP_DB_PASSWORD}@${CP_DB_HOST}:${CP_DB_PORT}/${CP_DB_NAME}?sslmode=require"
#
# Firewall Configuration:
# - Add ARO cluster worker nodes IP range to Azure PostgreSQL firewall rules
# - Or use VNet service endpoints for secure connectivity
# - Or use Private Link for fully private connectivity

