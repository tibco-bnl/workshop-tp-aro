# TIBCO Control Plane Base - Helm Install Values
# This file mirrors the helm upgrade command from the setup guide
# Using environment variables from Step 7.1 of how-to-cp-and-dp-openshift-aro-aks-setup-guide.md
# Version: 1.14.0
# Location: /Users/kul/git/tib/workshop-tp-aro/howto/aro-kul/

# ========================================
# USAGE:
# ========================================
# Export all environment variables from Step 7.1 first, then run:
# helm upgrade --install --wait --timeout 1h --create-namespace \
#   -n ${CP_INSTANCE_ID}-ns tibco-cp-base ${HELM_URL}/tibco-cp-base \
#   --version "${CP_TIBCO_CP_BASE_VERSION}" \
#   -f tibco-cp-base-values-helm-install.yaml

# ========================================
# BOOTSTRAP COMPONENTS
# ========================================

# Hybrid proxy for tunnel connectivity
hybrid-proxy:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: ${TP_INGRESS_CLASS}  # openshift-default
    tls:
      - secretName: ${CP_TUNNEL_TLS_SECRET_NAME}  # custom-tunnel-tls
        hosts:
          - '*.${CP_TUNNEL_DNS_DOMAIN}'  # *.cp1-tunnel.apps.nxp.atsnl-emea.azure.dataplanes.pro
    hosts:
      - host: '*.${CP_TUNNEL_DNS_DOMAIN}'
        paths:
          - path: /
            pathType: Prefix
            port: 105

# Router operator for Control Plane routing
router-operator:
  enabled: true
  # Session keys for authentication
  tscSessionKey:
    secretName: session-keys
    key: TSC_SESSION_KEY
  domainSessionKey:
    secretName: session-keys
    key: DOMAIN_SESSION_KEY
  # Ingress configuration for MY domain
  ingress:
    enabled: true
    ingressClassName: ${TP_INGRESS_CLASS}  # openshift-default
    tls:
      - secretName: ${CP_MY_TLS_SECRET_NAME}  # custom-my-tls
        hosts:
          - '*.${CP_MY_DNS_DOMAIN}'  # *.cp1-my.apps.nxp.atsnl-emea.azure.dataplanes.pro
    hosts:
      - host: '*.${CP_MY_DNS_DOMAIN}'
        paths:
          - path: /
            pathType: Prefix
            port: 100

# Resource set operator
resource-set-operator:
  enabled: true

# OpenTelemetry collector (optional - uncomment to enable logging)
# otel-collector:
#   enabled: true

# ========================================
# GLOBAL CONFIGURATION
# ========================================
global:
  # ========================================
  # TIBCO PLATFORM SETTINGS
  # ========================================
  tibco:
    # Network policy (set to false for ARO by default)
    createNetworkPolicy: ${TP_ENABLE_NETWORK_POLICY}  # false
    
    # Container registry configuration
    containerRegistry:
      url: ${TP_CONTAINER_REGISTRY_URL}  # csgprdeuwrepoedge.jfrog.io
      username: ${TP_CONTAINER_REGISTRY_USER}  # Set your username
      password: ${TP_CONTAINER_REGISTRY_PASSWORD}  # Set your password
      repository: ${TP_CONTAINER_REGISTRY_REPOSITORY}  # tibco-platform-docker-prod
    
    # Control plane instance identifier
    controlPlaneInstanceId: ${CP_INSTANCE_ID}  # cp1
    
    # Service account
    serviceAccount: ${CP_INSTANCE_ID}-sa  # cp1-sa
  
  # ========================================
  # EXTERNAL CONFIGURATION
  # ========================================
  external:
    # Cluster network information
    clusterInfo:
      nodeCIDR: ${TP_NODE_CIDR}      # 10.5.2.0/23
      podCIDR: ${TP_POD_CIDR}        # 10.128.0.0/14
      serviceCIDR: ${TP_SERVICE_CIDR}  # 172.30.0.0/16
    
    # DNS domains
    dnsTunnelDomain: ${CP_TUNNEL_DNS_DOMAIN}  # cp1-tunnel.apps.nxp.atsnl-emea.azure.dataplanes.pro
    dnsDomain: ${CP_MY_DNS_DOMAIN}            # cp1-my.apps.nxp.atsnl-emea.azure.dataplanes.pro
    
    # Storage configuration
    storage:
      resources:
        requests:
          storage: 10Gi
      storageClassName: ${TP_FILE_STORAGE_CLASS}  # azure-files-sc
    
    # ========================================
    # DATABASE CONFIGURATION - Azure PostgreSQL SaaS with SSL
    # ========================================
    # IMPORTANT: Update these values for your Azure PostgreSQL SaaS instance
    
    # Database host - Azure PostgreSQL fully qualified domain name
    # Example: myserver.postgres.database.azure.com
    db_host: ${CP_DB_HOST}  # e.g., cp-postgres.postgres.database.azure.com
    
    # For Azure PostgreSQL with read replicas (optional)
    # db_master_writer_host: ${CP_DB_MASTER_WRITER_HOST}  # Primary read-write endpoint
    # db_local_reader_host: ${CP_DB_LOCAL_READER_HOST}    # Read replica endpoint
    
    # Database name
    db_name: ${CP_DB_NAME}  # postgres or your database name
    
    # Database port (default PostgreSQL port)
    db_port: "${CP_DB_PORT}"  # "5432"
    
    # Database credentials (reference to Kubernetes secret)
    db_secret_name: ${CP_DB_SECRET_NAME}  # provider-cp-database-credentials
    db_username: ${CP_DB_USERNAME}  # admin username (e.g., adminuser@myserver)
    db_password: ${CP_DB_PASSWORD}  # admin password
    
    # SSL Configuration for Azure PostgreSQL
    # Azure PostgreSQL requires SSL by default
    db_ssl_mode: ${CP_DB_SSL_MODE}  # Options: disable, require, verify-ca, verify-full
    # For Azure PostgreSQL SaaS, use "require" or "verify-ca"
    # - "require": Enforces SSL but doesn't verify the certificate
    # - "verify-ca": Enforces SSL and verifies the certificate authority
    # - "verify-full": Enforces SSL and verifies the certificate and hostname
    
    # SSL Root Certificate (required if using verify-ca or verify-full)
    # For Azure PostgreSQL, download the certificate from:
    # https://docs.microsoft.com/en-us/azure/postgresql/concepts-ssl-connection-security
    #db_ssl_root_cert: ${CP_DB_SSL_ROOT_CERT}  # /path/to/BaltimoreCyberTrustRoot.crt.pem
    # Or reference a Kubernetes secret containing the certificate
    db_ssl_root_cert_secret: ${CP_DB_SSL_CERT_SECRET_NAME}
    
    # ========================================
    # ENCRYPTION CONFIGURATION
    # ========================================
    cpEncryptionSecretKey: CP_ENCRYPTION_SECRET_KEY
    cpEncryptionSecretName: cporch-encryption-secret
    
    # ========================================
    # ADMIN USER CONFIGURATION
    # ========================================
    admin:
      customerID: ${CP_ADMIN_CUSTOMER_ID}  # nxp-customer-id
      email: ${CP_ADMIN_EMAIL}             # cp-test@tibco.com
      firstname: ${CP_ADMIN_FIRSTNAME}     # cp-test
      lastname: ${CP_ADMIN_LASTNAME}       # cp-test
    
    # ========================================
    # EMAIL SERVER CONFIGURATION
    # ========================================
    emailServerType: ${CP_EMAIL_SERVER_TYPE}  # smtp
    emailServer:
      smtp:
        server: ${CP_EMAIL_SMTP_SERVER}     # development-mailserver.tibco-ext.svc.cluster.local
        port: "${CP_EMAIL_SMTP_PORT}"       # "1025"
        username: ${CP_EMAIL_SMTP_USERNAME}  # Empty for MailDev
        password: ${CP_EMAIL_SMTP_PASSWORD}  # Empty for MailDev
    
    # ========================================
    # LOG SERVER CONFIGURATION (Optional)
    # ========================================
    # Uncomment to enable log forwarding to external log server
    # logserver:
    #   endpoint: ${TP_LOGSERVER_ENDPOINT}   # e.g., https://logs.example.com:9200
    #   index: ${TP_LOGSERVER_INDEX}         # e.g., tibco-cp-logs
    #   username: ${TP_LOGSERVER_USERNAME}   # Elasticsearch username
    #   password: ${TP_LOGSERVER_PASSWORD}   # Elasticsearch password
    
    # Environment
    environment: production

